<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#07121d"><title>Med3D Studio</title>
<style>
:root{font-family:Inter,system-ui,sans-serif;color:#eaf4f8;background:#061019;--p:#0a1722;--b:rgba(150,195,212,.18);--a:#53d1d2;--m:#8199a7}*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#061019}button,input{font:inherit;color:inherit}.app{height:100dvh;display:grid;grid-template-rows:56px 45px minmax(0,1fr) 56px}.top{display:flex;align-items:center;gap:12px;padding:0 13px;background:#07121c;border-bottom:1px solid var(--b)}.brand{display:flex;align-items:center;gap:9px;font-weight:800}.logo{width:35px;height:35px;border-radius:10px;display:grid;place-items:center;background:var(--a);color:#061019}.project{margin:auto;min-width:0;max-width:420px;padding:7px 11px;border:1px solid var(--b);border-radius:9px;color:#afc2ca;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.actions{display:flex;gap:7px}.btn{border:1px solid var(--b);background:#10202b;border-radius:9px;min-height:36px;padding:0 11px;cursor:pointer}.btn.primary{background:var(--a);color:#061019;border:0;font-weight:800}.stages{display:flex;justify-content:center;align-items:center;gap:3px;overflow:auto;background:#08141e;border-bottom:1px solid var(--b)}.stage{border:0;background:transparent;color:#778f9b;border-radius:8px;padding:9px 10px;cursor:pointer;font-size:12px;font-weight:700}.stage.active{color:var(--a);background:rgba(83,209,210,.12)}.work{min-height:0;display:grid;grid-template-columns:235px minmax(0,1fr) 275px;position:relative}.panel{min-width:0;background:var(--p);display:flex;flex-direction:column}.left{border-right:1px solid var(--b)}.right{border-left:1px solid var(--b)}.pt{height:47px;display:flex;align-items:center;justify-content:space-between;padding:0 12px;border-bottom:1px solid var(--b);font-size:11px;text-transform:uppercase;letter-spacing:.7px}.search{margin:10px;border:1px solid var(--b);border-radius:8px;background:#07131d}.search input{width:100%;height:36px;border:0;outline:0;background:transparent;padding:0 9px}.parts{flex:1;min-height:0;overflow:auto;padding:0 7px 9px}.part{width:100%;display:grid;grid-template-columns:17px 13px minmax(0,1fr) 28px;gap:8px;align-items:center;min-height:41px;border:1px solid transparent;border-radius:8px;background:transparent;text-align:left;color:#afc1ca;cursor:pointer}.part.active{background:rgba(83,209,210,.12);border-color:rgba(83,209,210,.25)}.sw{width:11px;height:11px;border-radius:3px}.eye{border:0;background:transparent;cursor:pointer}.view{position:relative;min-width:0;min-height:0;background:#07121d}.view canvas{width:100%;height:100%;display:block}.badge{position:absolute;left:11px;top:11px;padding:6px 9px;border:1px solid var(--b);border-radius:8px;background:#07121ddd;color:#9db2bc;font-size:10px;z-index:3}.fallback{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;text-align:center;padding:25px;z-index:2;background:#07121d}.fallback.hide{display:none}.person{font-size:86px;color:#2d7282}.fallback p{max-width:500px;margin:0;color:#91a7b2;font-size:13px;line-height:1.5}.props{padding:13px;overflow:auto}.sel{display:flex;align-items:center;gap:10px;padding-bottom:12px;border-bottom:1px solid var(--b)}.big{width:42px;height:42px;border-radius:10px}.sel small{display:block;color:var(--m);font-size:9px}.field{display:flex;flex-direction:column;gap:6px;margin-top:13px;color:#95aab5;font-size:10px;font-weight:700}.field input[type=text]{height:37px;border:1px solid var(--b);border-radius:8px;background:#07131d;padding:0 9px}.color{display:grid;grid-template-columns:42px 1fr;gap:7px}.color input{height:37px}.field input[type=range]{width:100%;accent-color:var(--a)}.row{display:flex;justify-content:space-between}.row output{color:var(--a)}.pa{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:14px;padding-top:13px;border-top:1px solid var(--b)}.bottom{display:flex;justify-content:center;align-items:center;gap:7px;padding:8px;background:#07121c;border-top:1px solid var(--b);overflow:auto}.tool{border:1px solid var(--b);background:#10202b;border-radius:9px;min-height:38px;padding:0 10px;cursor:pointer;font-size:11px}.tool.active{color:var(--a);background:rgba(83,209,210,.12)}.mobile{display:none}.close{display:none}@media(max-width:850px){.work{grid-template-columns:1fr}.panel{position:absolute;top:0;bottom:0;width:min(84vw,315px);z-index:10;transform:translateX(-105%);transition:.2s}.right{right:0;transform:translateX(105%)}.panel.open{transform:translateX(0)}.mobile{display:flex;position:absolute;left:50%;bottom:11px;transform:translateX(-50%);gap:7px;z-index:6}.close{display:block}.project{display:none}.top{display:grid;grid-template-columns:auto 1fr}.actions{justify-self:end}.label{display:none}.bottom{justify-content:flex-start}}@media(max-width:520px){.app{grid-template-rows:53px 43px minmax(0,1fr) 53px}.stage{padding:8px;font-size:11px}}
</style>
</head>
<body>
<main class="app">
<header class="top"><div class="brand"><span class="logo">3D</span><span>Med3D Studio</span></div><div class="project" id="modelName">Paciente demonstrativo</div><div class="actions"><input id="file" type="file" accept=".glb" hidden><button class="btn" id="import">↥ <span class="label">Importar GLB</span></button><button class="btn primary" id="export">↧ <span class="label">Exportar</span></button></div></header>
<nav class="stages"><button class="stage">Criar</button><button class="stage">Modelo</button><button class="stage active">Segmentar</button><button class="stage">Corrigir</button><button class="stage">Textura</button><button class="stage">Pose</button><button class="stage">Exportar</button></nav>
<section class="work">
<aside class="panel left" id="lp"><div class="pt"><b>Partes do modelo</b><button class="btn close" data-close>×</button></div><label class="search"><input id="search" placeholder="Buscar parte…"></label><div class="parts" id="parts"></div></aside>
<div class="view"><div id="canvas"></div><div class="badge" id="status">Carregando 3D…</div><div class="fallback" id="fallback"><div class="person">♙</div><strong id="ft">Preparando o visualizador</strong><p id="fm">A interface já está carregada. O módulo 3D será iniciado em seguida.</p><button class="btn" onclick="location.reload()">Tentar novamente</button></div><div class="mobile"><button class="btn" id="op">Partes</button><button class="btn" id="or">Propriedades</button></div></div>
<aside class="panel right" id="rp"><div class="pt"><b>Propriedades</b><button class="btn close" data-close>×</button></div><div class="props"><div class="sel"><span class="big" id="big"></span><div><small>Parte selecionada</small><strong id="sl">Camisola hospitalar</strong></div></div><label class="field">Nome<input id="name" type="text"></label><label class="field">Cor<div class="color"><input id="color" type="color"><input id="hex" type="text"></div></label><label class="field"><span class="row">Rugosidade <output id="ro"></output></span><input id="rough" type="range" min="0" max="1" step=".01"></label><label class="field"><span class="row">Opacidade <output id="oo"></output></span><input id="opacity" type="range" min=".1" max="1" step=".01"></label><div class="pa"><button class="btn" id="isolate">Isolar</button><button class="btn" id="toggle">Ocultar</button></div></div></aside>
</section>
<footer class="bottom"><button class="tool active">Selecionar</button><button class="tool">Pincel</button><button class="tool">Laço</button><button class="tool" id="all">Mostrar tudo</button><button class="tool" id="wire">Wireframe</button><button class="tool" id="reset">Centralizar</button></footer>
</main>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script><script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script><script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script><script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/exporters/GLTFExporter.js"></script>
<script>
(function(){'use strict';var D=[['head','Cabeça','#d9a982',.72,1],['neck','Pescoço','#d5a37c',.72,1],['gown','Camisola hospitalar','#72b8b1',.9,1],['la','Braço esquerdo','#d8a781',.72,1],['ra','Braço direito','#d8a781',.72,1],['lh','Mão esquerda','#d9aa84',.72,1],['rh','Mão direita','#d9aa84',.72,1],['ll','Perna esquerda','#cbd7df',.84,1],['rl','Perna direita','#cbd7df',.84,1],['lf','Pé esquerdo','#eef3f6',.8,1],['rf','Pé direito','#eef3f6',.8,1]],P={},sel='gown',scene,camera,renderer,controls,root,ray,pointer,wire=false;D.forEach(function(d){P[d[0]]={id:d[0],label:d[1],color:d[2],rough:d[3],opacity:d[4],visible:true,mesh:null}});function e(id){return document.getElementById(id)}function draw(q){q=(q||'').toLowerCase();var list=e('parts');list.innerHTML='';Object.values(P).filter(function(p){return p.label.toLowerCase().includes(q)}).forEach(function(p,i){var r=document.createElement('div');r.className='part'+(p.id===sel?' active':'');r.tabIndex=0;r.innerHTML='<small>'+String(i+1).padStart(2,'0')+'</small><span class="sw" style="background:'+p.color+'"></span><span>'+p.label+'</span><button class="eye">'+(p.visible?'◉':'○')+'</button>';r.onclick=function(){select(p.id)};r.querySelector('button').onclick=function(x){x.stopPropagation();p.visible=!p.visible;apply(p);draw(e('search').value);props()};list.appendChild(r)})}function select(id){sel=id;draw(e('search').value);props();Object.values(P).forEach(apply)}function props(){var p=P[sel];if(!p)return;e('sl').textContent=p.label;e('big').style.background=p.color;e('name').value=p.label;e('color').value=p.color;e('hex').value=p.color.toUpperCase();e('rough').value=p.rough;e('opacity').value=p.opacity;e('ro').textContent=Math.round(p.rough*100)+'%';e('oo').textContent=Math.round(p.opacity*100)+'%';e('toggle').textContent=p.visible?'Ocultar':'Mostrar'}function mat(p){return new THREE.MeshStandardMaterial({color:p.color,roughness:p.rough,transparent:p.opacity<1,opacity:p.opacity,wireframe:wire,emissive:p.id===sel?0x0b4054 sg+' A interface continuará visível.';e('fallback').classList.remove('hide')}function init(){if(!window.THREE)throw Error();scene=new THREE.Scene;scene.background=new THREE.Color(0x07121d);camera=new THREE.PerspectiveCamera(38,1,.1,100);renderer=new THREE.WebGLRenderer({antialias:false,powerPreference:'default',failIfMajorPerformanceCaveat:false});renderer.setPixelRatio(1);e('canvas').appendChild(renderer.domElement);controls=new THREE.OrbitControls(camera,renderer.domElement);ray=new THREE.Raycaster;pointer=new THREE.Vector2;scene.add(new THREE.HemisphereLight(0xe9fbff,0x14202a,1.3));var l=new THREE.DirectionalLight(0xffffff,2.5);l.position.set(4,7,5);scene.add(l);var g=new THREE.GridHelper(10,40,0x31718a,0x1b4658);g.position.y=-2.62;scene.add(g);demo();fit();resize();renderer.domElement.onpointerdown=function(x){var r=renderer.domElement.getBoundingClientRect();pointer.set((x.clientX-r.left)/r.width*2-1,-((x.clientY-r.top)/r.height*2-1));ray.setFromCamera(pointer,camera);var h=ray.intersectObjects(root.children,true);if(h[0]&&h[0].object.userData.partId)select(h[0].object.userData.partId)};window.onresize=resize;e('fallback').classList.add('hide');e('status').textContent='WebGL ativo';(function loop(){requestAnimationFrame(loop);controls.update();renderer.render(scene,camera)})()}e('search').oninput=function(x){draw(x.target.value)};e('name').oninput=function(x){P[sel].label=x.target.value;e('sl').textContent=x.target.value;draw(e('search').value)};e('color').oninput=function(x){P[sel].color=x.target.value;apply(P[sel]);props();draw(e('search').value)};e('hex').onchange=function(x){if(/^#[0-9a-f]{6}$/i.test(x.target.value)){P[sel].color=x.target.value;apply(P[sel]);props();draw(e('search').value)}};e('rough').oninput=function(x){P[sel].rough=+x.target.value;apply(P[sel]);props()};e('opacity').oninput=function(x){P[sel].opacity=+x.target.value;apply(P[sel]);props()};e('toggle').onclick=function(){P[sel].visible=!P[sel].visible;apply(P[sel]);props();draw(e('search').value)};e('isolate').onclick=function(){Object.values(P).forEach(function(p){p.visible=p.id===sel;apply(p)});draw();props()};e('all').onclick=function(){Object.values(P).forEach(function(p){p.visible=true;apply(p)});draw();props()};e('wire').onclick=function(){wire=!wire;this.classList.toggle('active',wire);Object.values(P).forEach(apply)};e('reset').onclick=fit;e('import').onclick=function(){e('file').click()};e('file').onchange=function(x){var f=x.target.files[0];if(!f||!THREE.GLTFLoader)return;var u=URL.createObjectURL(f);new THREE.GLTFLoader().load(u,function(o){URL.revokeObjectURL(u);scene.remove(root);root=o.scene;root.name='MED3D_MODEL_ROOT';scene.add(root);P={};var i=0;root.traverse(function(m){if(!m.isMesh)return;var id='m'+(++i),a=Array.isArray(m.material)?m.material[0]:m.material;m.userData.partId=id;P[id]={id:id,label:m.name||'Parte '+i,color:a&&a.color?'#'+a.color.getHexString():'#9eb7c7',rough:a&&a.roughness||.7,opacity:a&&a.opacity||1,visible:m.visible,mesh:m}});sel=Object.keys(P)[0];e('modelName').textContent=f.name;draw();props();fit()},null,function(){fail('Não foi possível abrir esse GLB.')})};e('export').onclick=function(){if(!root||!THREE.GLTFExporter)return;new THREE.GLTFExporter().parse(root,function(r){var b=new Blob([r],{type:'model/gltf-binary'}),u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download='med3d-modelo.glb';a.click();setTimeout(function(){URL.revokeObjectURL(u)},500)},{binary:true,onlyVisible:true})};document.querySelectorAll('.stage').forEach(function(b){b.onclick=function(){document.querySelectorAll('.stage').forEach(function(x){x.classList.remove('active')});b.classList.add('active')}});var lp=e('lp'),rp=e('rp');function close(){lp.classList.remove('open');rp.classList.remove('open')}e('op').onclick=function(){close();lp.classList.add('open')};e('or').onclick=function(){close();rp.classList.add('open')};document.querySelectorAll('[data-close]').forEach(function(b){b.onclick=close});draw();props();window.onload=function(){try{init()}catch(x){console.error(x);fail('Abra a página diretamente no Chrome e verifique a aceleração gráfica.')}};setTimeout(function(){if(!renderer)fail('As bibliotecas 3D não carregaram. Verifique sua conexão.')},8000)})();
</script>
</body></html>
